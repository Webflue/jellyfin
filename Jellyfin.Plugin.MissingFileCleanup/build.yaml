name: "Missing File Cleanup"
guid: "5e8cb70d-9b7e-40b6-b614-8b2d535ec020"
version: "1.0.0.0"
targetAbi: "10.11.0.0"
framework: "net8.0"
overview: "Removes library items whose files are gone from disk."
description: >
  A scheduled task that walks every movie, episode, audio track and video in
  the library, checks whether the file still exists on disk, and deletes the
  database entry if it does not. Runs in dry-run mode by default; real
  deletion must be opted into from the plugin's configuration page. A
  configurable safety threshold aborts the run if too many items are flagged
  at once (guards against a missing mount).
category: "General"
